spring:
  datasource:
    url: ${PRMS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/prms}
    username: ${PRMS_DATASOURCE_USERNAME:postgres}
    password: ${PRMS_DATASOURCE_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${PRMS_GOOGLE_CLIENT_ID:a}
            client-secret: ${PRMS_GOOGLE_CLIENT_SECRET:a}
            scope:
              - profile
              - email
            redirect-uri: ${PRMS_GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/login-google}
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
  messages:
    basename: i18n/messages
    encoding: UTF-8
  mail:
    host: ${PRMS_MAIL_HOST:smtp.gmail.com}
    port: ${PRMS_MAIL_PORT:587}
    username: ${PRMS_MAIL_USERNAME:a}
    password: ${PRMS_MAIL_PASSWORD:a}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        transport:
          protocol: smtp

server:
  port: ${PRMS_SERVER_PORT:9999}

logging:
  level:
    com.tranhuudat.prms: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/prms.log

app:
  mail:
    enabled: ${PRMS_APP_MAIL_ENABLED:false}
    from: ${PRMS_APP_MAIL_FROM:${PRMS_MAIL_USERNAME:a}}
  notification:
    job:
      enabled: ${APP_NOTIFICATION_JOB_ENABLED:true}
      fixed-delay-ms: ${APP_NOTIFICATION_JOB_FIXED_DELAY_MS:30000}
      batch-size: ${APP_NOTIFICATION_JOB_BATCH_SIZE:25}
      max-attempts: ${APP_NOTIFICATION_JOB_MAX_ATTEMPTS:8}
  jwt:
    secret-key: amFzaGRmc2hnZmpza2Fmc2hkZnljem5iY2FzZ2R3cWZzbmFzZGFkZnNhc2Rm
    expiration-access-token: 604800000
    expiration-refresh-token: 604800000
  push:
    # VAPID keys cho Web Push (generate 1 lần, set qua env cho production)
    vapid-public-key: ${PRMS_APP_PUSH_VAPID_PUBLIC_KEY:a}
    vapid-private-key: ${PRMS_APP_PUSH_VAPID_PRIVATE_KEY:a}
    subject: ${PRMS_APP_PUSH_SUBJECT:mailto:admin@localhost}
  client:
    base-url: ${PRMS_APP_CLIENT_BASE_URL:http://localhost:4200}
  server:
    base-url: ${PRMS_APP_SERVER_BASE_URL:http://localhost:9999}
